# =============================================================
# Jenkins 시크릿 매니페스트
# 목적: Jenkins가 Gitea/Harbor에 접근할 때 필요한 인증 정보를 관리한다.
#
# ⚠️  주의: 이 파일은 .gitignore에 추가되어야 한다.
#           실제 값은 base64로 인코딩되어야 한다.
#
# base64 인코딩 방법:
#   echo -n "your-token-here" | base64
#
# 적용 방법:
#   kubectl apply -f infrastructure/jenkins/jenkins-secrets.yaml -n jenkins
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: jenkins-secrets
  namespace: jenkins
  labels:
    app: jenkins
    component: credentials
  annotations:
    description: "Jenkins CI/CD 파이프라인 인증 정보"
type: Opaque
data:
  # Gitea Jenkins 봇 토큰 (base64 인코딩)
  # 원본값 예시: "abc123def456"
  # 인코딩: echo -n "abc123def456" | base64
  gitea-token: "REPLACE_WITH_BASE64_ENCODED_GITEA_TOKEN"

  # Harbor 관리자 비밀번호 (base64 인코딩)
  # 원본값: "Harbor12345"
  # 인코딩: echo -n "Harbor12345" | base64
  harbor-password: "SGFyYm9yMTIzNDU="
