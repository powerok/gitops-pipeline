{{/*
=============================================================
ConfigMap 템플릿
Order API 애플리케이션 설정값을 ConfigMap으로 관리한다.
민감하지 않은 환경 변수만 여기에 넣는다.
민감 정보(비밀번호 등)는 반드시 Secret을 사용한다.
=============================================================
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "order-system.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "order-system.labels" . | nindent 4 }}
data:
  # Spring Boot 활성 프로파일
  SPRING_PROFILES_ACTIVE: {{ .Values.env.SPRING_PROFILES_ACTIVE | quote }}

  # 서버 포트
  SERVER_PORT: {{ .Values.env.SERVER_PORT | quote }}

  # PostgreSQL JDBC URL
  # StatefulSet의 헤드리스 서비스를 통해 접근한다.
  SPRING_DATASOURCE_URL: {{ .Values.env.SPRING_DATASOURCE_URL | quote }}

  # 환경 정보 (로그 및 트레이싱용)
  APP_ENVIRONMENT: {{ .Values.global.environment | quote }}

  # 로그 레벨 (values-dev.yaml / values-prod.yaml에서 오버라이드)
  {{- if .Values.env.LOGGING_LEVEL_ROOT }}
  LOGGING_LEVEL_ROOT: {{ .Values.env.LOGGING_LEVEL_ROOT | quote }}
  {{- end }}
  {{- if .Values.env.LOGGING_LEVEL_COM_EXAMPLE }}
  LOGGING_LEVEL_COM_EXAMPLE: {{ .Values.env.LOGGING_LEVEL_COM_EXAMPLE | quote }}
  {{- end }}

  # Spring Boot Actuator 설정 (헬스체크 엔드포인트 노출)
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
