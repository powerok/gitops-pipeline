{{/*
=============================================================
ServiceAccount 템플릿
=============================================================
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "order-system.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "order-system.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}

---
{{/*
=============================================================
HorizontalPodAutoscaler 템플릿
Prod 환경에서 values-prod.yaml의 autoscaling.enabled: true 시 활성화
=============================================================
*/}}
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "order-system.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "order-system.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "order-system.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    # CPU 사용률 기반 스케일링
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    # 메모리 사용률 기반 스케일링
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
  # 스케일링 정책: 급격한 스케일 다운 방지
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5분간 안정 확인 후 스케일 다운
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60    # 1분간 안정 확인 후 스케일 업
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
{{- end }}
