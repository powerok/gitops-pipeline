{{/*
=============================================================
Secret 템플릿 (DB 접속 정보)
파일 위치: helm-charts/order-system/templates/secret.yaml

⚠️  주의사항:
  - 이 템플릿은 시크릿을 Helm이 직접 생성하는 방식이다.
  - 운영 환경에서는 External Secrets Operator, Vault,
    또는 SealedSecrets를 사용하는 것을 강력히 권장한다.
  - values.yaml에 평문 비밀번호를 커밋하지 말 것.

운영 권장 방식:
  1. kubectl create secret generic order-db-secret \
       --from-literal=username=orderuser \
       --from-literal=password="your-secure-password" \
       --from-literal=postgres-password="your-postgres-password" \
       -n order-dev
  2. 이후 Helm이 existingSecret을 참조하도록 설정

개발 환경 편의를 위해 이 템플릿을 제공한다.
=============================================================
*/}}

{{- if not .Values.postgresql.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: order-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "order-system.labels" . | nindent 4 }}
  annotations:
    # 이 Secret은 Helm 삭제 시 함께 삭제되지 않도록 설정
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # ⚠️  아래 값들은 실제 배포 전에 반드시 변경해야 한다.
  # values.yaml이나 values-dev.yaml에 절대 평문으로 커밋하지 말 것.
  # 환경 변수나 CI/CD 파이프라인의 Secret 주입 기능을 활용하라.
  username: "orderuser"
  password: "OrderDB@Dev2024!"
  postgres-password: "Postgres@Dev2024!"
{{- end }}
